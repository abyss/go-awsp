version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build a snapshot release to dist/
    cmds:
      - goreleaser release --snapshot --clean

  build-local:
    desc: Build the go-awsp binary to bin/go-awsp
    cmds:
      - go build -o bin/go-awsp

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  install:
    desc: Build and install go-awsp to GOPATH/bin
    deps: [build-local]
    cmds:
      - cp bin/go-awsp $(go env GOPATH)/bin/go-awsp

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/
